name: Destroy AWS VPC

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DESTROY" to confirm deletion'
        required: true
        type: string
      environment:
        description: 'Environment to destroy'
        type: choice
        options:
          - dev
          - prod
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  destroy-vpc:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DESTROY'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      - name: Terraform Init
        run: terraform init -reconfigure

      # 关键修改：使用 -target 精准销毁选定环境，避免误删
      - name: Terraform Destroy
        run: |
          echo "Destroying environment: ${{ github.event.inputs.environment }}"
          terraform destroy -auto-approve -target="module.vpc[\"${{ github.event.inputs.environment }}\"]"

      - name: Verify destruction
        run: |
          echo "========================================="
          echo "✅ Successfully destroyed environment: ${{ github.event.inputs.environment }}"
          echo "========================================="