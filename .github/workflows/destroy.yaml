name: Destroy AWS VPC

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DESTROY" to confirm deletion of all VPC resources'
        required: true
        type: string
      environment:
        description: 'Environment to destroy'
        type: choice
        options:
          - dev
          - prod
        default: 'dev'

permissions:
  id-token: write
  contents: read

jobs:
  destroy-vpc:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DESTROY'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: |
          cd terraform 
          terraform init -reconfigure

    
      - name: Get VPC ID before destroy
        id: get_vpc
        run: |
          cd terraform
          echo "=== 检查 Terraform 状态 ==="
          terraform state list
          echo ""
          if terraform state list 2>/dev/null | grep -q "aws_vpc.main"; then
            VPC_ID=$(terraform output -raw vpc_id 2>/dev/null || echo "unknown")
            echo "vpc_id=$VPC_ID" >> $GITHUB_OUTPUT
            echo "✅ Found VPC: $VPC_ID"
          else
            echo "vpc_id=not_found" >> $GITHUB_OUTPUT
            echo "We can't find VPC in state file"
            echo "The resources in state file are:"
            terraform state list
          fi

      
      - name: Terraform Destroy
        run: |
          cd terraform
          terraform destroy -auto-approve
        env:
          TF_VAR_environment: ${{ github.event.inputs.environment }}

      - name: Verify destruction
        run: |
          echo "========================================="
          echo "✅ Successfully removed the VPC resources"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "VPC ID: ${{ steps.get_vpc.outputs.vpc_id }}"
          echo "========================================="