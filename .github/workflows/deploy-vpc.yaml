name: Deploy AWS VPC

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - '**.tf'           # 只有 .tf 文件变化时触发
      - '**.tfvars'       # 只有变量文件变化时触发
      - '.github/workflows/**' # 或者工作流文件自身变化时触发

permissions:
  id-token: write
  contents: read

jobs:
  deploy-vpc:
    runs-on: ubuntu-latest
    # 只有当 PR 被合并（merged）时才执行，而不是仅仅被关闭
    if: github.event.pull_request.merged == true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      - name: Terraform Init
        run: terraform init -migrate-state
        working-directory: . # 修改为根目录

      - name: Terraform Validate
        run: terraform validate
        working-directory: . # 修改为根目录

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        working-directory: . # 修改为根目录

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: . # 修改为根目录

      - name: Terraform Output
        id: output
        run: |
          # 获取完整的 JSON 输出
          echo "vpc_info=$(terraform output -json vpc_configurations)" >> $GITHUB_OUTPUT
        working-directory: .

      - name: Display outputs
        run: |
          echo "✅ VPCs Successfully Created/Updated!"
          echo "Full Configs: ${{ steps.output.outputs.vpc_info }}"